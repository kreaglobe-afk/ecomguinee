<script>
  (function() {
    // 1. Force le "zoom" correct sur téléphone
    var meta = document.createElement('meta');
    meta.name = "viewport";
    meta.content = "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no";
    document.getElementsByTagName('head')[0].appendChild(meta);

    // 2. Active le menu "Hamburger" pour le mobile
    document.addEventListener('click', function(e) {
      if (e.target.closest('[data-landingsite-mobile-menu-toggle]')) {
        var menu = document.querySelector('[data-landingsite-mobile-menu]');
        if (menu) {
          menu.classList.toggle('hidden');
          menu.style.display = menu.classList.contains('hidden') ? 'none' : 'block';
          menu.style.backgroundColor = 'white'; // Assure la visibilité
        }
      }
    });

    // 3. Correction des images trop larges sur mobile
    var fixImages = function() {
      var imgs = document.querySelectorAll('img');
      imgs.forEach(function(img) {
        img.style.maxWidth = '100%';
        img.style.height = 'auto';
      });
    };
    window.onload = fixImages;
  })();
</script>
